<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Story 22</title>

<style>
body {margin:0; font-family:Arial; background:black; overflow:hidden;}

.screen{
 position:absolute; width:100%; height:100%;
 display:flex; flex-direction:column;
 justify-content:center; align-items:center;
 opacity:0; pointer-events:none;
 transition:0.8s;
}
.screen.active{opacity:1; pointer-events:all;}

#intro{
 background:url("22.jpg") center/cover no-repeat; /* картинка на первом титуле */
 z-index:10; 
 position:relative;
 display: flex;
 justify-content: center;
 align-items: center;
 height: 100vh; /* высота экрана */
}

#menu, #question{background:black; color:white;}

.neon-btn{
 padding:15px 25px;
 border-radius:25px;
 border:none;
 cursor:pointer;
 margin:10px;
 font-weight:bold;
 z-index:15; /* кнопки находятся на переднем плане */
}

.btn-white{background:white; color:black;}
.btn-green{background:lightgreen; color:black;}
.btn-red{background:#ff4d4d; color:white;}

.row{display:flex; gap:20px;}

.modal{
 position:absolute;
 top:50%; left:50%;
 transform:translate(-50%,-50%) scale(0.7);
 padding:30px;
 border-radius:20px;
 opacity:0;
 pointer-events:none;
 transition:0.4s;
 width:400px;
 text-align:center;
 z-index:20; /* увеличиваем z-index для модальных окон */
}
.modal.active{
 opacity:1;
 pointer-events:all;
 transform:translate(-50%,-50%) scale(1);
}

.modal-green{
 background:linear-gradient(lightgreen, green);
 box-shadow:0 0 25px darkgreen;
 color:black;
}

.modal-red{
 background:linear-gradient(#ff6b6b, darkred);
 box-shadow:0 0 25px red;
 color:white;
}

.modal-gray{
 background:#222;
 box-shadow:0 0 20px gray;
 color:white;
}

#finalScreen{
 position:absolute; width:100%; height:100%;
 display:flex; justify-content:center; align-items:center;
 color:white; font-size:24px;
 background:black;
 opacity:0; transition:1.5s;
 z-index:10;
}
#finalScreen.active{opacity:1;}

.video-background {
 position: absolute;
 top: 0;
 left: 0;
 width: 100%;
 height: 100%;
 object-fit: cover;
 z-index: 5; /* Под остальными элементами */
 opacity: 0.6; /* Слегка затемним видео */
}

#finalScreen p {
 padding: 20px;
 border: 3px solid black; /* Черная обводка */
 font-size: 36px;
 text-align: center;
 z-index: 15;
}

</style>
</head>

<body>

<audio id="music" src="mus.mp3" loop></audio>

<!-- СЛАЙД 1 -->
<div id="intro" class="screen active">
 <button class="neon-btn btn-white" onclick="startSite()">Беременная учительница</button>
</div>

<!-- СЛАЙД 2 -->
<div id="menu" class="screen">
 <video class="video-background" autoplay loop muted>
   <source src="noob.mp4" type="video/mp4">
   Ваш браузер не поддерживает видео.
 </video>
 <h2 style="text-align:center; max-width:600px; color:white;">
 +/- Быть беременной учительницей школы 22 от ученика 11 а класса
 </h2>

 <div class="row">
   <button class="neon-btn btn-green" onclick="openModal('plus')">ПЛЮСЫ</button>
   <button class="neon-btn btn-red" onclick="openModal('minus')">МИНУСЫ</button>
 </div>

 <button class="neon-btn btn-white" onclick="openModal('creator')">СОЗДАТЕЛЬ</button>

 <button class="neon-btn btn-white" onclick="goQuestion()">Ты серьезно?</button>
</div>

<!-- МОДАЛКИ -->
<div id="plus" class="modal modal-green">
 <b style="color:red;">Плюсы</b><br><br>
 Возможные чувства
 <br><br>
 <button class="neon-btn btn-white" onclick="closeModal('plus')">Закрыть</button>
</div>

<div id="minus" class="modal modal-red">
 <b style="color:red;">Минусы</b><br><br>
 Риски, последствия
 <br><br>
 <button class="neon-btn btn-white" onclick="closeModal('minus')">Закрыть</button>
</div>

<div id="creator" class="modal modal-gray">
 <img src="ivan.jpg" width="200"><br><br>
 <button class="neon-btn btn-white" onclick="closeModal('creator')">Закрыть</button>
 <p style="color:white;">Будущий отец, сам ученик и создатель сайта — Лукьянов Иван</p> <!-- Добавлена подпись -->
</div>

<!-- СЛАЙД 3 -->
<div id="question" class="screen">
 <video class="video-background" autoplay loop muted>
   <source src="noob.mp4" type="video/mp4">
   Ваш браузер не поддерживает видео.
 </video>
 <h2 style="color:white;">У вас правда это случилось?</h2> <!-- Белый текст -->
 <div class="row">
   <button class="neon-btn btn-white" onclick="showVideo()">Нет</button>
   <button class="neon-btn btn-red" onclick="showHelp()">Да</button>
 </div>
</div>

<!-- ВИДЕО -->
<div id="videoScreen" class="screen">
 <video id="video" src="vid.mp4" controls autoplay></video>
</div>

<!-- ПОМОЩЬ -->
<div id="help" class="modal modal-red">
 Психологическая помощь<br>8-800-2000-122
 <br><br>
 <button class="neon-btn btn-white" onclick="closeModal('help')">Закрыть</button>
</div>

<!-- ФИНАЛ -->
<div id="finalScreen" class="screen">
 <video class="video-background" autoplay loop muted>
   <source src="vid.mp4" type="video/mp4">
   Ваш браузер не поддерживает видео.
 </video>
 <p>Иногда история — это не выбор, а последствия</p> <!-- Белый текст с черной обводкой -->
</div>

<script>
const intro = document.getElementById('intro');
const menu = document.getElementById('menu');
const question = document.getElementById('question');
const videoScreen = document.getElementById('videoScreen');
const finalScreen = document.getElementById('finalScreen');

// Функция для начала сайта
function startSite(){
 try {
   const music = document.getElementById('music');
   if (music) { music.play().catch(() => {}); }
 } catch(e){}

 // Убираем intro и показываем меню
 intro.style.display = 'none'; 
 menu.classList.add('active');
}

// Функция для открытия модалки
function openModal(id){
 const el = document.getElementById(id);
 if (el) el.classList.add('active');
}

// Функция для закрытия модалки
function closeModal(id){
 const el = document.getElementById(id);
 if (el) {
   el.classList.remove('active');  // Закрываем модалку
 }
}

// Функция для перехода к следующему слайду
function goQuestion(){
 menu.classList.remove('active');
 question.classList.add('active');
}

// Функция для отображения видео
function showVideo(){
 question.classList.remove('active');
 videoScreen.classList.add('active');

 setTimeout(() => {
   finalScreen.classList.add('active');
 }, 5000);
}

// Функция для отображения помощи
function showHelp(){
 const help = document.getElementById('help');
 if (help) help.classList.add('active');
}
</script>

</body>
</html>
